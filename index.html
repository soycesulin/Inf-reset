<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inflammation Reset — Cecilia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf7f4; }
    button { cursor: pointer; transition: all 0.15s; }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const data = {

      { name: "Fresh whole chicken", note: "Cook or freeze same day you buy it. Histamine builds over time and cooking doesn't destroy it." },
      { name: "Fresh turkey breast", note: null },

      { name: "Fresh or frozen salmon", note: "Buy and cook same day, or freeze immediately. Histamine builds over time — cooking doesn't destroy it. Check sell-by date." },
      { name: "Fresh eggs", note: "Boil max 2 days ahead, not a full week" },
      { name: "Plain firm tofu", note: "Not smoked, not marinated" },
      { name: "Fresh cottage cheese", note: "Check no additives" },
      { name: "Fresh mozzarella or ricotta", note: "Unaged only" },
      { name: "Fresh goat chèvre", note: "Unaged only" },

    ],

      { name: "Quinoa", note: null },
      { name: "Sweet potato", note: "In moderation" },

      { name: "Broccoli", note: null },

      { name: "Iceberg or romaine lettuce", note: "Instead of arugula/spinach" },
      { name: "Asparagus", note: null },
      { name: "Leek", note: "Instead of red onion" },
      { name: "Garlic", note: "Cooked, not raw" },
      { name: "Corn", note: null },

    ],
  },
  trafficLight: {
    food: {
      green: [
        "Fresh chicken, turkey, white fish",
        "Fresh eggs (boiled max 2 days ahead)",
        "Cottage cheese, fresh mozzarella, ricotta",
        "Zucchini, cucumber, broccoli, pumpkin",
        "Rice, quinoa, sweet potato",
        "Blueberries, pear, apple, mango",
        "Olive oil, coconut oil, ghee",
        "Hojicha latte with lactose-free milk",
        "Chamomile, ginger, peppermint tea",
        "Plain rice cakes",
        "Medjool dates (1–2 at night)",
        "Fresh lemon juice — use instead of vinegar in all dressings (bottled lemon juice is not ok, only fresh squeezed)",
      ],
      yellow: [
        "Matcha latte — lower histamine than coffee but still a DAO inhibitor, limit to once/day",
        "Flat white — keep to one/day max, not on empty stomach",
        "Chickpea noodles — fine outside of flares, hold during reset",
        "Banana — histamine liberator, OK outside flares",
        "Raspberries — moderate histamine, hold during strict reset",
        "Brown rice bread — check ingredients carefully",
        "Garlic and leek — cooked only, raw triggers",
        "Dried legumes cooked at home — fine if prepared fresh",
      ],
      red: [
        "Smoked tofu, smoked anything",
        "Canned tuna or any canned fish",
        "Skyr, aged cheese, feta, parmesan",
        "Spinach, tomato, avocado",
        "Dark chocolate, anything chocolate-coated",
        "Kombucha and any fermented drinks",
        "Cornichons, pickles, vinegar-based anything",
        "Coke Zero and diet sodas (artificial sweeteners block DAO)",
        "Peanut butter",
        "Protein bars with additives",
        "Leftovers older than 1 day (cook fresh or freeze immediately)",
        "Alcohol",
        "Mate (DAO inhibitor)",
      ],
    },
    drinks: {
      green: [
        "Still filtered water — always your base",
        "Hojicha latte with lactose-free milk — best morning option",
        "Chamomile tea — best evening option, anti-inflammatory",
        "Ginger tea — supports gut motility",
        "Peppermint tea — helps with gas and bloating",
      ],
      yellow: [
        "Matcha latte (1/day max) — some caffeine, lower than coffee",
        "Flat white (1/day max) — keep it, just not 2",
        "Coconut water — OK in small amounts",
      ],
      red: [
        "Kombucha — fermented, high histamine",
        "Coke Zero / diet sodas — DAO blockers",
        "Alcohol — all of it during reset",
        "Mate — DAO inhibitor",
        "Fruit juices — sugar spike, inflammatory",
      ],
    },
  },
  supplements: [
    { name: "DAO enzyme tablets", timing: "Before every meal", note: "You have them already — start using them now. Most important supplement right now.", priority: "high" },
    { name: "Magnesium glycinate", timing: "Evening, before bed", note: "Glycinate form is best — supports sleep, muscle recovery, gut motility.", priority: "high" },
    { name: "Quercetin", timing: "Morning with breakfast", note: "Natural DAO stabilizer and antihistamine — take consistently.", priority: "high" },
    { name: "Vitamin C", timing: "Morning", note: "Supports DAO function. Buffered form is gentler on gut.", priority: "medium" },
    { name: "Probiotic (specific strains)", timing: "Morning, away from Ritalin", note: "Look for Lactobacillus rhamnosus and Bifidobacterium. AVOID L. casei and L. bulgaricus — they increase histamine.", priority: "high" },
    { name: "BCAA", timing: "Around strength training", note: "Fine to continue around your strength sessions.", priority: "medium" },
    { name: "Folic acid", timing: "Morning", note: "Keep taking it.", priority: "medium" },
    { name: "Vitamin D3 + K2", timing: "Morning with food", note: "Most people in Berlin are deficient. Supports immune regulation and mood.", priority: "medium" },
    { name: "Zinc", timing: "Evening with food", note: "Supports gut lining repair and DAO production. Don't take on empty stomach.", priority: "medium" },
    { name: "L-Glutamine", timing: "Morning, empty stomach", note: "Primary fuel for gut lining cells — the most direct supplement for leaky gut repair. Take as powder, 5g in water before breakfast.", priority: "high" },
    { name: "Omega-3 (algae-based)", timing: "Morning with food", note: "Anti-inflammatory, supports gut lining integrity. Algae-based avoids the histamine risk from rancid fish oil capsules.", priority: "medium" },
  ],
  exercise: {
    weekly: [
      { day: "Monday", sessions: ["Strength training (lunch)", "Walking pad 30min (morning or evening)"], luteal: null },
      { day: "Tuesday", sessions: ["Pilates (lunch)", "Walking pad optional"], luteal: null },
      { day: "Wednesday", sessions: ["Strength training (lunch)", "Walking pad 30min"], luteal: "Yoga or light pilates instead of strength" },
      { day: "Thursday", sessions: ["Pilates or yoga (lunch)", "Walking pad 30min"], luteal: null },
      { day: "Friday", sessions: ["HIIT or spinning (optional swap)", "Walking pad optional"], luteal: "Stretching yoga only" },
      { day: "Saturday", sessions: ["Walking pad 30–60min while reading/podcasts (morning)"], luteal: null },
      { day: "Sunday", sessions: ["Walking pad 30–60min while reading/podcasts (morning)", "Rest or gentle walk outside"], luteal: null },
    ],
    rules: [
      "Exercise at lunch (12–12:30) is ideal — Ritalin is active, cortisol naturally peaks in the morning and is declining, good window for performance",
      "During active inflammation: drop HIIT and spinning, reduce weights to 60–70% of max, keep moving but don't push to failure",
      "Walking pad: slow pace with incline is zone 2 cardio — anti-inflammatory, burns fat, doesn't spike cortisol. Do it daily",
      "Strength training: keep it as-is. Low rep, max weight, 45min is optimal for muscle recovery without cortisol overload",
      "Follicular phase (day 1–13): your performance window. Push harder here",
      "Luteal phase (day 15–28): reduce intensity, prioritize recovery. PMS week = yoga, pilates, walking only",
    ],
  },
  phases: [
    { phase: "Phase 1", duration: "Weeks 1–2", title: "Strict reset", focus: "Eliminate all high-histamine foods. Eat fresh, cook simple. Take DAO before every meal. No exceptions.", goal: "Break the inflammation cycle and identify how your body responds without triggers", journal: "Log: what you ate, time of day, energy, bloating, puffiness (face/feet), bowel movement, mood. One short paragraph per day.", color: "green" },
    { phase: "Phase 2", duration: "Weeks 3–4", title: "Reintroduction", focus: "Add one food back every 3 days. Start with lower-risk ones: banana, raspberries, chickpea noodles. Log reactions.", goal: "Map your personal tolerance. Not all histamine-intolerant people react to everything equally.", journal: "Log: the reintroduced food, any reaction within 24–48hrs, overall inflammation score (1–5).", color: "yellow" },
    { phase: "Phase 3", duration: "Month 2", title: "Stable routine", focus: "You know your triggers. Build a sustainable grocery list around your personal tolerance. Occasional indulgences are fine outside of flare periods.", goal: "Long-term stability, not permanent restriction", journal: "Shift to weekly logging. Note patterns around your cycle. Flag if inflammation returns and what preceded it.", color: "blue" },
    { phase: "Phase 4", duration: "Ongoing", title: "Medical follow-up", focus: "GP appointment for full thyroid panel + hormone panel. Gastro referral for SIBO breath test + DAO test. Adjust supplements based on results.", goal: "Understand the root cause, not just manage symptoms", journal: "Bring your journal notes to appointments as evidence. Patterns over weeks are more convincing to doctors than single-day symptoms.", color: "purple" },
  ],
};

const Tag = ({ children, color }) => {
  const colors = { green: { bg: "#e8f5e9", text: "#2e7d32" }, yellow: { bg: "#fff8e1", text: "#f57f17" }, red: { bg: "#fce4ec", text: "#c62828" }, blue: { bg: "#e3f2fd", text: "#1565c0" }, purple: { bg: "#f3e5f5", text: "#6a1b9a" } };
  const c = colors[color] || colors.blue;
  return <span style={{ background: c.bg, color: c.text, fontSize: "0.65rem", padding: "2px 8px", borderRadius: "100px", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em", fontWeight: 600 }}>{children}</span>;
};

const TrafficItem = ({ item, color }) => {
  const dot = { green: "#4caf50", yellow: "#ffc107", red: "#ef5350" }[color];
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: "0.6rem", marginBottom: "0.6rem" }}>
      <span style={{ width: 8, height: 8, borderRadius: "50%", background: dot, flexShrink: 0, marginTop: 6 }} />
      <span style={{ fontSize: "0.9rem", color: "#3d3530", lineHeight: 1.5 }}>{item}</span>
    </div>
  );
};

const tabs = ["Grocery", "Traffic Light", "Supplements", "Exercise", "Phases"];

function App() {
  const [activeTab, setActiveTab] = React.useState("Grocery");
  const [groceryCategory, setGroceryCategory] = React.useState("protein");
  const [tlCategory, setTlCategory] = React.useState("food");

  return (
    <div style={{ fontFamily: "'DM Serif Display', Georgia, serif", background: "#faf7f4", minHeight: "100vh", padding: "2.5rem 1.5rem" }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ marginBottom: "2.5rem", paddingBottom: "1.5rem", borderBottom: "1px solid #e8e0d8" }}>
          <p style={{ fontSize: "0.65rem", letterSpacing: "0.2em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "0.6rem" }}>
            Cecilia — Inflammation Reset Protocol
          </p>
          <h1 style={{ fontSize: "2.4rem", color: "#2c2420", fontWeight: 400, lineHeight: 1.15, marginBottom: "0.8rem" }}>
            Your Anti-Inflammation<br />Playbook
          </h1>
          <p style={{ fontSize: "0.75rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace" }}>
            Low histamine · Gut repair · Cycle-synced movement
          </p>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap", marginBottom: "2rem" }}>
          {tabs.map(tab => (
            <button key={tab} onClick={() => setActiveTab(tab)} style={{
              padding: "0.45rem 1.1rem", borderRadius: "100px",
              border: activeTab === tab ? "none" : "1px solid #d8cfc8",
              background: activeTab === tab ? "#2c2420" : "transparent",
              color: activeTab === tab ? "#faf7f4" : "#6b5c52",
              fontSize: "0.78rem", fontFamily: "'DM Mono', monospace", letterSpacing: "0.04em",
            }}>{tab}</button>
          ))}
        </div>

        {/* Grocery */}
        {activeTab === "Grocery" && (
          <div>
            <h2 style={{ fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1.2rem", borderBottom: "1px solid #e8e0d8", paddingBottom: "0.6rem" }}>Weekly Grocery List</h2>
            <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
              {Object.keys(data.grocery).map(cat => (
                <button key={cat} onClick={() => setGroceryCategory(cat)} style={{
                  padding: "0.3rem 0.9rem", borderRadius: "100px",
                  border: groceryCategory === cat ? "none" : "1px solid #d8cfc8",
                  background: groceryCategory === cat ? "#a0846c" : "transparent",
                  color: groceryCategory === cat ? "#fff" : "#6b5c52",
                  fontSize: "0.72rem", fontFamily: "'DM Mono', monospace", textTransform: "capitalize",
                }}>{cat}</button>
              ))}
            </div>
            {data.grocery[groceryCategory].map((item, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "0.75rem 0", borderBottom: "1px solid #ede8e3", gap: "1rem" }}>
                <span style={{ fontSize: "0.95rem", color: "#2c2420" }}>{item.name}</span>
                {item.note && <span style={{ fontSize: "0.75rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", textAlign: "right", flexShrink: 0, maxWidth: "55%" }}>{item.note}</span>}
              </div>
            ))}
          </div>
        )}

        {/* Traffic Light */}
        {activeTab === "Traffic Light" && (
          <div>
            <h2 style={{ fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1.2rem", borderBottom: "1px solid #e8e0d8", paddingBottom: "0.6rem" }}>Traffic Light Guide</h2>
            <div style={{ display: "flex", gap: "0.4rem", marginBottom: "1.5rem" }}>
              {["food", "drinks"].map(cat => (
                <button key={cat} onClick={() => setTlCategory(cat)} style={{
                  padding: "0.3rem 0.9rem", borderRadius: "100px",
                  border: tlCategory === cat ? "none" : "1px solid #d8cfc8",
                  background: tlCategory === cat ? "#a0846c" : "transparent",
                  color: tlCategory === cat ? "#fff" : "#6b5c52",
                  fontSize: "0.72rem", fontFamily: "'DM Mono', monospace", textTransform: "capitalize",
                }}>{cat}</button>
              ))}
            </div>
            {["green", "yellow", "red"].map(color => {
              const labels = { green: "Eat freely", yellow: "Limit / caution", red: "Avoid during reset" };
              return (
                <div key={color} style={{ marginBottom: "2rem" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "1rem" }}>
                    <span style={{ width: 10, height: 10, borderRadius: "50%", background: { green: "#4caf50", yellow: "#ffc107", red: "#ef5350" }[color], flexShrink: 0 }} />
                    <span style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace" }}>{labels[color]}</span>
                  </div>
                  {data.trafficLight[tlCategory][color].map((item, i) => <TrafficItem key={i} item={item} color={color} />)}
                </div>
              );
            })}
          </div>
        )}

        {/* Supplements */}
        {activeTab === "Supplements" && (
          <div>
            <h2 style={{ fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "0.8rem", borderBottom: "1px solid #e8e0d8", paddingBottom: "0.6rem" }}>Supplements</h2>
            <p style={{ fontSize: "0.8rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1.5rem" }}>Ritalin 10mg at wake-up + noon — take supplements at least 30min away where possible.</p>
            {data.supplements.map((s, i) => (
              <div key={i} style={{ padding: "1.1rem", background: s.priority === "high" ? "#fdf8f5" : "#fff", border: s.priority === "high" ? "1px solid #d8c4b4" : "1px solid #ede8e3", borderRadius: 10, marginBottom: "0.8rem" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.4rem" }}>
                  <span style={{ fontSize: "1rem", color: "#2c2420", fontWeight: 600 }}>{s.name}</span>
                  <Tag color={s.priority === "high" ? "purple" : "blue"}>{s.priority === "high" ? "priority" : "keep"}</Tag>
                </div>
                <div style={{ fontSize: "0.75rem", color: "#a0846c", fontFamily: "'DM Mono', monospace", marginBottom: "0.5rem" }}>⏱ {s.timing}</div>
                <div style={{ fontSize: "0.85rem", color: "#6b5c52", lineHeight: 1.6 }}>{s.note}</div>
              </div>
            ))}
          </div>
        )}

        {/* Exercise */}
        {activeTab === "Exercise" && (
          <div>
            <h2 style={{ fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1.2rem", borderBottom: "1px solid #e8e0d8", paddingBottom: "0.6rem" }}>Movement Plan</h2>
            <h3 style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1rem" }}>Weekly Schedule</h3>
            {data.exercise.weekly.map((day, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "90px 1fr", gap: "1rem", padding: "0.85rem 0", borderBottom: "1px solid #ede8e3", alignItems: "start" }}>
                <span style={{ fontSize: "0.78rem", fontFamily: "'DM Mono', monospace", color: "#a0846c", fontWeight: 600 }}>{day.day}</span>
                <div>
                  {day.sessions.map((s, j) => <div key={j} style={{ fontSize: "0.88rem", color: "#2c2420", marginBottom: "0.25rem" }}>· {s}</div>)}
                  {day.luteal && <div style={{ fontSize: "0.78rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginTop: "0.3rem" }}>luteal phase: {day.luteal}</div>}
                </div>
              </div>
            ))}
            <div style={{ marginTop: "2rem" }}>
              <h3 style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1rem" }}>Rules</h3>
              {data.exercise.rules.map((rule, i) => (
                <div key={i} style={{ display: "flex", gap: "0.8rem", marginBottom: "0.9rem", alignItems: "flex-start" }}>
                  <span style={{ color: "#a0846c", fontFamily: "'DM Mono', monospace", fontSize: "0.8rem", flexShrink: 0 }}>0{i + 1}</span>
                  <span style={{ fontSize: "0.88rem", color: "#3d3530", lineHeight: 1.6 }}>{rule}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Phases */}
        {activeTab === "Phases" && (
          <div>
            <h2 style={{ fontSize: "0.7rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", marginBottom: "1.2rem", borderBottom: "1px solid #e8e0d8", paddingBottom: "0.6rem" }}>Phase Plan</h2>
            <p style={{ fontSize: "0.85rem", color: "#6b5c52", lineHeight: 1.7, marginBottom: "1.5rem" }}>Keep a daily paragraph in Ulysses. The pattern across weeks becomes evidence — for yourself and for doctors.</p>
            {data.phases.map((p, i) => (
              <div key={i} style={{ padding: "1.2rem", border: "1px solid #d8cfc8", borderRadius: 12, marginBottom: "1rem", background: "#fff" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.7rem" }}>
                  <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
                    <Tag color={p.color}>{p.phase}</Tag>
                    <span style={{ fontSize: "0.7rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace" }}>{p.duration}</span>
                  </div>
                </div>
                <h3 style={{ fontSize: "1.1rem", color: "#2c2420", marginBottom: "0.5rem" }}>{p.title}</h3>
                <p style={{ fontSize: "0.86rem", color: "#3d3530", lineHeight: 1.6, marginBottom: "0.5rem" }}>{p.focus}</p>
                <p style={{ fontSize: "0.82rem", color: "#a0846c", lineHeight: 1.5, marginBottom: "0.8rem", fontStyle: "italic" }}>Goal: {p.goal}</p>
                <div style={{ padding: "0.7rem 0.9rem", background: "#faf7f4", borderRadius: 8, borderLeft: "3px solid #a0846c" }}>
                  <span style={{ fontSize: "0.68rem", color: "#9a8c7e", fontFamily: "'DM Mono', monospace", display: "block", marginBottom: "0.3rem" }}>JOURNAL PROMPT</span>
                  <span style={{ fontSize: "0.82rem", color: "#6b5c52", lineHeight: 1.6 }}>{p.journal}</span>
                </div>
              </div>
            ))}
            <div style={{ marginTop: "1rem", padding: "1.2rem", background: "#fdf8f5", border: "1px solid #d8c4b4", borderRadius: 12 }}>
              <h3 style={{ fontSize: "0.95rem", color: "#2c2420", marginBottom: "0.5rem" }}>Follow-up with Claude</h3>
              <p style={{ fontSize: "0.85rem", color: "#6b5c52", lineHeight: 1.6 }}>At the end of each phase, paste your journal notes into a new chat. Ask: "Here are my inflammation logs from the last two weeks — what patterns do you see and what should I adjust?" The more consistent your logging, the more specific the feedback.</p>
            </div>
          </div>
        )}

        <div style={{ marginTop: "3rem", paddingTop: "1.5rem", borderTop: "1px solid #e8e0d8", fontSize: "0.72rem", color: "#b8a898", fontFamily: "'DM Mono', monospace", lineHeight: 1.7 }}>
          This is informational guidance, not medical advice. Bring this plan and your journals to your GP and relevant specialists.
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
